# OpenRouter Configuration for uCode
# Provider routing: local Ollama → OpenRouter cloud models

openrouter:
  endpoint: "https://openrouter.ai/api/v1"
  
  models:
    primary:
      name: "google/glm-5.1"
      context_window: 128000
      cost_per_1k_tokens: "$0.15"
      use_case: "Complex reasoning, architecture, debugging"
    secondary:
      name: "deepseek/deepseek-v4-flash"
      context_window: 128000
      cost_per_1k_tokens: "$0.05"
      use_case: "Code generation, refactoring"
    tertiary:
      name: "qwen/qwen3.6-27b"
      context_window: 32000
      cost_per_1k_tokens: "$0.02"
      use_case: "Simple tasks, templating"
    premium:
      name: "anthropic/claude-opus-4.7"
      context_window: 200000
      cost_per_1k_tokens: "$15.00"
      use_case: "Premium reasoning (opt-in only)"

  fallback_chain:
    - "local:qwen2.5-coder:3b (Ollama, offline, free)"
    - "deepseek/deepseek-v4-flash"
    - "google/glm-5.1"

  routing:
    budget_alert: 5.00  # USD — warn when approaching
    budget_hard_limit: 20.00  # USD — block cloud requests
    track_usage: true
    log_to: "~/.local/share/udos/costs/openrouter-usage.yaml"