<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uCode4 — 3D World Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; overflow: hidden; }
    #ucode4-viewport { width: 100vw; height: 100vh; display: block; }
    #info {
      position: absolute; top: 16px; left: 16px;
      background: rgba(0,0,0,0.7); padding: 12px 16px;
      border-radius: 8px; font-size: 14px;
      pointer-events: none;
    }
    #info h1 { font-size: 16px; color: #88ff88; margin-bottom: 4px; }
    #info p { color: #aaa; font-size: 12px; }
  </style>
</head>
<body>
  <div id="ucode4-viewport"></div>
  <div id="info">
    <h1>uCode4 — 3D World</h1>
    <p>Drag to orbit · Scroll to zoom</p>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
