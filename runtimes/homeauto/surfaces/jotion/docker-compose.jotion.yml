version: '3.8'

services:
  jotion:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_CONVEX_URL=${CONVEX_URL:-http://localhost:3001}
      - NEXT_PUBLIC_UCODE3_API=${UCODE3_API:-http://localhost:8484}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    volumes:
      - jotion_data:/app/data

  # Convex backend for real-time sync
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:latest
    ports:
      - "3001:3001"
    environment:
      - CONVEX_CLOUD_URL=http://localhost:3001
    volumes:
      - convex_data:/convex/data

volumes:
  jotion_data:
  convex_data:
