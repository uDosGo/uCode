<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #333; padding: 16px; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
    .section { margin-bottom: 16px; }
    .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #888; margin-bottom: 8px; letter-spacing: 0.5px; }
    button { width: 100%; padding: 10px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-bottom: 8px; }
    button.primary { background: #4361ee; color: white; }
    button.primary:hover { background: #3651d4; }
    button.secondary { background: #f0f0f0; color: #333; }
    button.secondary:hover { background: #e0e0e0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-top: 8px; display: none; }
    .status.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .status.error { display: block; background: #fbe9e7; color: #c62828; }
    .status.info { display: block; background: #e3f2fd; color: #1565c0; }
    .divider { height: 1px; background: #e0e0e0; margin: 16px 0; }
    .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
    .checkbox-group input[type="checkbox"] { margin: 0; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; background: #e3f2fd; color: #1565c0; margin-left: 4px; }
    .footer { font-size: 11px; color: #aaa; text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>🎨 USX Export</h1>
  <p class="subtitle">Export Figma designs to USX Bundle Format</p>
  
  <div class="section">
    <div class="section-title">Export</div>
    <button class="primary" id="export-selection" onclick="exportSelection()">
      📦 Export Selection
    </button>
    <button class="secondary" id="export-page" onclick="exportPage()">
      📄 Export Current Page
    </button>
  </div>
  
  <div class="divider"></div>
  
  <div class="section">
    <div class="section-title">Options</div>
    <div class="checkbox-group">
      <input type="checkbox" id="include-variables" checked />
      <label for="include-variables">Extract text as LENS variables</label>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="include-skin" checked />
      <label for="include-skin">Extract colors & typography to SKIN</label>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="include-effects" checked />
      <label for="include-effects">Include shadow & blur effects</label>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="flatten-groups" />
      <label for="flatten-groups">Flatten nested groups</label>
    </div>
  </div>
  
  <div class="divider"></div>
  
  <div class="section">
    <div class="section-title">Actions</div>
    <button class="secondary" onclick="copyToClipboard()">
      📋 Copy Bundle JSON
    </button>
    <button class="secondary" onclick="downloadBundle()">
      💾 Download .usx File
    </button>
  </div>
  
  <div id="status" class="status"></div>
  
  <div class="footer">
    USX v1.0.0 · Universal Surface Exchange
  </div>
  
  <script>
    let currentBundle = null;
    let currentFileName = 'export.usx';
    
    // Listen for messages from the plugin code
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      
      switch (msg.type) {
        case 'export-bundle':
          currentBundle = msg.bundle;
          currentFileName = msg.fileName;
          showStatus('success', `✅ Exported: ${msg.bundle.name}`);
          break;
        case 'export-bundles':
          currentBundle = msg.bundles;
          currentFileName = 'bundles.json';
          showStatus('success', `✅ Exported ${msg.count} bundles`);
          break;
        case 'error':
          showStatus('error', `❌ ${msg.message}`);
          break;
      }
    };
    
    function exportSelection() {
      parent.postMessage({ pluginMessage: { type: 'export-selection' } }, '*');
      showStatus('info', '⏳ Exporting selection...');
    }
    
    function exportPage() {
      parent.postMessage({ pluginMessage: { type: 'export-page' } }, '*');
      showStatus('info', '⏳ Exporting page...');
    }
    
    function copyToClipboard() {
      if (!currentBundle) {
        showStatus('error', '❌ No bundle to copy. Export something first.');
        return;
      }
      
      const text = JSON.stringify(currentBundle, null, 2);
      
      // Copy via textarea
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      
      showStatus('success', '📋 Bundle JSON copied to clipboard');
    }
    
    function downloadBundle() {
      if (!currentBundle) {
        showStatus('error', '❌ No bundle to download. Export something first.');
        return;
      }
      
      const text = JSON.stringify(currentBundle, null, 2);
      const blob = new Blob([text], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = currentFileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      showStatus('success', `💾 Downloaded: ${currentFileName}`);
    }
    
    function showStatus(type, message) {
      const status = document.getElementById('status');
      status.className = `status ${type}`;
      status.textContent = message;
      
      // Auto-hide after 5 seconds
      clearTimeout(window.statusTimeout);
      window.statusTimeout = setTimeout(() => {
        status.style.display = 'none';
      }, 5000);
    }
  </script>
</body>
</html>
