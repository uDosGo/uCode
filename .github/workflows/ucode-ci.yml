name: uCode CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build gridcore
        run: npm run -w @udos/gridcore build
      - name: Build viewport-renderer
        run: npm run -w @udos/viewport-renderer build
      - name: Build gridsmith
        run: npm run -w @udos/gridsmith build
      - name: Test gridcore
        run: npm run -w @udos/gridcore test
      - name: Test viewport-renderer
        run: npm run -w @udos/viewport-renderer test
      - name: Test gridsmith
        run: npm run -w @udos/gridsmith test